name: CI (Integración Continua)

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: "${{ github.workflow }}-${{ github.head_ref }}"
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

jobs:
  test:
    name: Probar en ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Instalar dependencias
        uses: ./.github/actions/install-dependencies

      - name: Ejecutar pruebas E2E (End-to-End)
        run: pnpm run test
        env:
          PAT_1: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

  code-checks:
    name: Verificación de código

    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Instalar dependencias
        uses: ./.github/actions/install-dependencies

      - name: Comprobar formato
        run: pnpm run format:check

      - name: Análisis estático (Lint con knip)
        run: pnpm run lint:knip
