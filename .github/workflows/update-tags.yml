name: Actualizar etiquetas de versión
on:
  push:
    branches-ignore:
      - "**"
    tags:
      - "v*.*.*"

permissions: {}

jobs:
  update-semver:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar código fuente
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Actualizar versión semántica
        uses: haya14busa/action-update-semver@7d2c558640ea49e798d46539536190aff8c18715 # v1.5.1
