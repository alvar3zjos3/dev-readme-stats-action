name: Dev Readme Stats Action
description: Acción de GitHub para generar tarjetas de estadísticas dinámicas en formato SVG. Bifurcación personalizada con español como idioma principal y temas predeterminados para el ecosistema dev-readme-stats.
author: alvar3zjos3
inputs:
  card:
    description: Tipo de tarjeta a generar (stats, top-langs, pin, wakatime, gist).
    required: true
  options:
    description: Opciones para la tarjeta (cadena de consulta o JSON).
    required: false
    default: ""
  path:
    description: Ruta de salida para el archivo SVG (ruta relativa; incluir el nombre del archivo con extensión .svg).
    required: false
    default: ""
  token:
    description: Token de GitHub (PAT o GITHUB_TOKEN).
    required: false
    default: ""
  core_version:
    description: Versión de @stats-organization/github-readme-stats-core a usar internamente.
    required: false
    default: "v2"
outputs:
  path:
    description: Ruta donde se ha guardado el archivo SVG generado.
    value: ${{ steps.generate.outputs.path }}
runs:
  using: composite
  steps:
    # Tanto `package_json_file` de pnpm/action-setup como `node-version-file` de setup-node
    # se resuelven de forma relativa al $GITHUB_WORKSPACE, pero nuestro package.json se encuentra en
    # ${{ github.action_path }} — por lo tanto lo convertimos a una ruta relativa al espacio de trabajo.
    - name: Calcular la ruta del package.json relativa al espacio de trabajo
      id: resolve_path
      run: echo "package_json=$(realpath --relative-to="$GITHUB_WORKSPACE" "${{ github.action_path }}/package.json")" >> "$GITHUB_OUTPUT"
      shell: bash
    - name: Instalar pnpm
      uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      with:
        package_json_file: ${{ steps.resolve_path.outputs.package_json }}
    - name: Configurar Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: ${{ steps.resolve_path.outputs.package_json }}
    - name: Instalar dependencias
      # --prod omite devDependencies (husky, vitest, etc.); --ignore-scripts omite el
      # hook de preparación de husky, que de otro modo fallaría ya que husky no está instalado.
      # https://github.com/stats-organization/github-readme-stats-action/issues/63
      run: pnpm install --frozen-lockfile --prod --ignore-scripts
      shell: bash
      working-directory: ${{ github.action_path }}
    - name: Generar tarjeta
      id: generate
      run: node ${{ github.action_path }}/index.js
      shell: bash
      env:
        INPUT_CARD: ${{ inputs.card }}
        INPUT_OPTIONS: ${{ inputs.options }}
        INPUT_PATH: ${{ inputs.path }}
        INPUT_CORE_VERSION: ${{ inputs.core_version }}
        PAT_1: ${{ inputs.token || github.token }}
branding:
  icon: bar-chart-2
  color: blue
